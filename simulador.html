<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
</head>
<body>
    <<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <header class="topbar">
        <h1 class="titulo">Simulador de Crédito</h1>
        <p class="subtitulo">Somos un banco que da vida</p>
    </header>
    <div class="container">
        <div class="header">
            <h1 class="titulo">Simulador de Crédito</h1>
            <p class="slogan">¡Somos un Banco que da vida!</p>
        </div>

        <div class="card">
            <h2>Datos financieros</h2>

            <label for="txtIngresos">Ingresos</label>
            <input type="text" id="txtIngresos">

            <label for="txtEgresos">Egresos</label>
            <input type="text" id="txtEgresos">

            <div class="result-box">
                <p>Disponible <span id="spnDisponible"></span></p>
                <p>Capacidad de pago <span id="spnCapacidadPago"></span></p>
            </div>
        </div>

        <div class="card">
            <h2>Solicitud de crédito</h2>

            <label for="txtMonto">Monto</label>
            <input type="text" id="txtMonto">

            <label for="txtPlazo">Plazo en años</label>
            <input type="text" id="txtPlazo">

            <label for="txtTasaInteres">Tasa de interés</label>
            <input type="text" id="txtTasaInteres">

            <div class="result-box">
                <p>Interés <span id="spnInteresPagar"></span></p>
                <p>Total <span id="spnTotalPrestamo"></span></p>
                <p>Cuota mensual <span id="spnCuotaMensual"></span></p>
                <p class="estado">Estado <span id="spnEstadoCredito">ANALIZANDO...</span></p>
            </div>
        </div>

        <div class="buttons">
            <button onclick="calcular()" id="btnCalcularCredito">Calcular</button>
            <button id="btnReiniciar">Reiniciar</button>
        </div>
    </div>

</body>
</html>
